<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مريومتي</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        /* شاشة القفل */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff9a9e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .lock-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input { padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; text-align: center; width: 80%; }
        button { padding: 10px 25px; border-radius: 20px; border: none; background: #d63384; color: white; cursor: pointer; }

        /* المحتوى */
        #main-content { display: none; } /* مخفي في البداية */

        .time-box { background: white; padding: 10px; border-radius: 10px; display: inline-block; min-width: 60px; margin: 5px; }
        .time-box span { font-weight: bold; color: #d63384; display: block; font-size: 1.2rem; }
        .gallery img { width: 90%; border-radius: 15px; margin-bottom: 15px; border: 4px solid white; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="color: #d63384;">اكتبي تاريخ اليوم اللي جمعنا ❤️</h2>
            <input type="text" id="passInput" placeholder="4/6/2025">
            <br>
            <button onclick="unlock()">دخول</button>
            <p id="error" style="color: red; display: none;">التاريخ غلط يا مريومتي! ❤️</p>
        </div>
    </div>

    <div id="main-content">
        <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">مريومتي حبيبتي</h1>
        <p style="color: white;">هانت ونقفل أول سنة مع بعض ❤️</p>

        <div id="countdown">
            <div class="time-box"><span id="days">00</span>يوم</div>
            <div class="time-box"><span id="hours">00</span>ساعة</div>
            <div class="time-box"><span id="minutes">00</span>دقيقة</div>
            <div class="time-box"><span id="seconds">00</span>ثانية</div>
        </div>

        <p style="background: white; padding: 15px; border-radius: 50px; display: inline-block; font-weight: bold; color: #d63384; margin: 20px 0;">
            بحبك يا أم حمو.. ويارب دايماً مع بعض 💍
        </p>

        <div style="margin: 20px 0;">
            <audio id="bgMusic" loop>
                <source src="mp32026.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="gallery">
            <h3>صورنا الحلوة 📸</h3>
            <img src="IMG_6284.jpeg">
            <img src="IMG_6285.jpeg">
            </div>
    </div>

    <script>
        function unlock() {
            var p = document.getElementById("passInput").value;
            if (p === "4/6/2025") {
                document.getElementById("lock-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                document.getElementById("bgMusic").play();
            } else {
                document.getElementById("error").style.display = "block";
            }
        }

        // العداد
        const target = new Date("2025-06-04T00:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
