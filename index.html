<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إهداء خاص</title>
    <style>
        /* إعدادات الخلفية الهادية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdf6f0 0%, #fae1dd 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* عشان القلوب متعملش سكرول */
            position: relative;
        }

        /* الكارت الأساسي */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            width: 350px;
            z-index: 10; /* عشان يظهر فوق القلوب */
            border: 1px solid #f9dcc4;
        }

        h2 { color: #d63384; margin-bottom: 25px; font-size: 24px; }
        
        input {
            width: 85%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #f0b4b4;
            border-radius: 15px;
            text-align: center;
            outline: none;
        }

        button {
            background-color: #d63384;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover { background-color: #b02a6b; transform: scale(1.05); }

        #secretContent { display: none; }

        .message {
            font-size: 26px;
            color: #d63384;
            font-weight: bold;
            line-height: 1.5;
        }

        /* أنيميشن القلوب */
        .heart {
            position: absolute;
            top: -10%;
            color: #ffb3c1;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's'; // سرعة السقوط
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        setInterval(createHeart, 300); // سرعة ظهور القلوب الجديدة
    </script>

    <div class="card" id="loginBox">
        <h2>ادخلي كلمة السر ❤️</h2>
        <input type="text" id="passwordInput" placeholder="اكتبي التاريخ هنا...">
        <br>
        <button onclick="checkPassword()">فتح</button>
    </div>

    <div class="card" id="secretContent">
        <div class="message">
            إلى مراتي وحبيبتي بودتي ❤️
        </div>
        <p style="color: #666; font-size: 16px; margin-top: 20px;">6 / 8 / 2008<br>تاريخ ميتنسيش</p>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            const correctPass = "6/8/2008";
            
            if (pass === correctPass) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('secretContent').style.display = 'block';
            } else {
                alert("الباسورد مش صح يا روحي.. ركزي ❤️");
            }
        }
    </script>

</body>
</html>
