<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى مريومتي</title>
    <style>
        /* ستايل شاشة القفل */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ff9a9e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s;
        }

        #lock-screen input {
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: none;
            text-align: center;
            margin-top: 15px;
            outline: none;
        }

        #lock-screen button {
            margin-top: 15px;
            padding: 10px 30px;
            background: #d63384;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        /* ستايل الصفحة الأصلي */
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: #d63384;
            margin: 0;
            padding: 20px;
            text-align: center;
            visibility: hidden; /* مخفية لحد ما نكتب الباسورد */
        }

        h1 { font-size: 2.2rem; margin-top: 20px; }
        #countdown { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .time-box { background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 12px; min-width: 65px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .time-box span { font-size: 1.5rem; font-weight: bold; display: block; color: #ff4d6d; }
        .footer-text { font-size: 1.2rem; font-weight: bold; margin: 20px 0; background: white; padding: 15px 25px; border-radius: 50px; }
        .music-player { margin: 20px 0; background: rgba(255, 255, 255, 0.5); padding: 10px; border-radius: 30px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 800px; margin-top: 30px; }
        .gallery img { width: 100%; border-radius: 15px; border: 5px solid white; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: white;">اكتبي تاريخ اليوم اللي جمعنا ❤️</h2>
        <input type="text" id="passwordInput" placeholder="يوم/شهر/سنة">
        <button onclick="checkPassword()">فتح</button>
        <p id="errorMsg" style="color: #800000; margin-top: 10px; display: none;">التاريخ غلط يا مريومتي! ركزي</p>
    </div>

    <h1>مريومتي حبيبتي</h1>
    <p style="font-size: 1.2rem; color: #fff;">هانت ونقفل أول سنة مع بعض ❤️</p>

    <div id="countdown">
        <div class="time-box"><span id="days">00</span>يوم</div>
        <div class="time-box"><span id="hours">00</span>ساعة</div>
        <div class="time-box"><span id="minutes">00</span>دقيقة</div>
        <div class="time-box"><span id="seconds">00</span>ثانية</div>
    </div>

    <div class="footer-text">بحبك يا أم حمو.. ويارب دايماً مع بعض وسوا 💍</div>

    <div class="music-player">
        <p>🎵 أغنيتنا شغالة الآن...</p>
        <audio id="mySong" loop>
            <source src="mp32026.mp3" type="audio/mpeg">
        </audio>
    </div>

    <video controls style="max-width: 90%; border-radius: 15px;">
        <source src="your_video_name.mp4" type="video/mp4">
    </video>

    <h3>صورنا الحلوة 📸</h3>
    <div class="gallery">
        <img src="IMG_6284.jpeg">
        <img src="IMG_6285.jpeg">
        <img src="IMG_2622.jpeg">
        <img src="IMG_2626.jpeg">
        <img src="IMG_2627.jpeg">
        </div>

    <script>
        function checkPassword() {
            var pass = document.getElementById("passwordInput").value;
            // الباسورد اللي انت طلبته
            if (pass === "4/6/2025") {
                document.getElementById("lock-screen").style.display = "none";
                document.body.style.visibility = "visible";
                document.getElementById("mySong").play(); // تشغيل الأغنية فوراً
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        // تاريخ نهاية أول سنة (يوم 4 شهر 6 سنة 2025 مثلاً)
        const anniversaryDate = new Date("2025-06-04T00:00:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = anniversaryDate - now;
            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
